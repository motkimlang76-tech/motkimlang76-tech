<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Mot Kimlang GitHub Profile Banner</title>
  <desc id="desc">A banner for Mot Kimlang, full-stack developer in progress.</desc>
  <defs>
